<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 17 Theme Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        body { background-color: #f0f2f5; font-family: -apple-system, system-ui, sans-serif; }
        .navbar { background: #ffffff; border-bottom: 1px solid #ddd; }
        .main-container { padding-top: 30px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fi fi-rr-paint-roller me-2"></i>Theme Studio
        </a>
    </div>
</nav>

<div class="container main-container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
